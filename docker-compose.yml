version: "3.9"

services:
  frontend:
    build: .
    container_name: fusionboard_frontend
    env_file:
      - .env
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: fusionboard_nginx
    depends_on:
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
